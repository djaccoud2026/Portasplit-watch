name: Check PortaSplit stock

on:
  schedule:
    # Toutes les 15 minutes (le minimum fiable sur GitHub Actions)
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scraper.py

      - name: Commit updated status.json
        run: |
          git config user.name "portasplit-bot"
          git config user.email "actions@github.com"
          git add status.json
          git diff --quiet --cached || git commit -m "Update stock status"
          git push
